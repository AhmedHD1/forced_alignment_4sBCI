name: mfa-paper
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.10
  - numpy=1.25.1
  - scipy=1.11.1
  - pandas=2.0.3
  - matplotlib=3.7.2
  - seaborn=0.12.2
  - statsmodels=0.14.0
  - scikit-learn=1.3.0
  - tqdm=4.67.1
  - joblib=1.3.1
  - colorama=0.4.6
  - pip
  - pip:
      - plotly==6.0.1
      - umap-learn>=0.5.3
      - librosa>=0.10.0
      - scikit-learn-intelex>=2023.2.1
      - kaleido  # required for plotly SVG/PDF export
